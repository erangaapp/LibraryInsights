
syntax = "proto3";

import "google/protobuf/timestamp.proto";

option csharp_namespace = "Library.Contracts.Inventory.Common";

package inventory;

message BookInfo {
  int32 id = 1;
  string title = 2;
  string author = 3;
  int32 pages = 4;
}

message Book {
  int32 id = 1;
  string title = 2;
  string author = 3;
  string isbn = 4;
  int32 pages = 5;
  int32 copies = 6;
  google.protobuf.Timestamp date_received = 7;
  bool is_discontinued = 8;
}